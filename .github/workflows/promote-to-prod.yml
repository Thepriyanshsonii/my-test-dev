name: Promote Dev to Prod

on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev repository
        uses: actions/checkout@v4
        with:
          path: dev

      - name: Clone prod repository
        run: |
          git clone https://x-access-token:${{ secrets.PROD_REPO_TOKEN }}@github.com/Thepriyanshsonii/my-test-prod.git prod

      - name: Copy files to prod
        run: |
          rsync -av --delete \
            --exclude=".git" \
            --exclude=".github/workflows" \
            dev/ prod/

      - name: Commit and Push
        run: |
          cd prod

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Promote dev to prod"
          git push origin main