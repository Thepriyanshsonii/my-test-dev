name: Promote Dev to Prod

on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev repository
        uses: actions/checkout@v4
        with:
          path: dev

      - name: Checkout prod repository
        uses: actions/checkout@v4
        with:
          repository: Thepriyanshsonii/my-test-prod
          token: ${{ secrets.PROD_REPO_TOKEN }}
          path: prod
          ref: main

      - name: Copy dev files to prod
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github/workflows' \
            dev/ prod/

      - name: Commit and push to prod
        run: |
          cd prod
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to promote."
            exit 0
          fi

          git commit -m "Promote dev main to prod"
          git push origin main